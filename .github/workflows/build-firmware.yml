# Custom firmware build pipeline (executor V1, PRD §6).
#
# Triggered by the website backend via workflow_dispatch (src/lib/executor/github.ts).
# Contract with the executor:
#   - run-name embeds the client-generated build_id — workflow_dispatch returns no run id,
#     so the run name is the correlation key for status polling and webhook callbacks.
#   - On success, firmware images + meta.json are published as assets on a GitHub Release
#     tagged `build-<build_id>`; the executor reads
#     https://github.com/<repo>/releases/download/build-<build_id>/meta.json
#     (shape: {buildId, file, sha256, sizeBytes, expiresAt}).
#   - On failure, no release is created; GitHub Actions keeps the full build log.
#     Inputs and logs being public on this repo is an accepted product decision (PRD §6);
#     the config whitelist below is the safety boundary (PRD §3.3).
#
# Uses the built-in GITHUB_TOKEN (needs `permissions: contents: write`) — no external storage
# account or secrets. 24-hour artifact expiry is enforced by .github/workflows/prune-builds.yml,
# which deletes old build-* releases; meta.json's expiresAt mirrors it for display.
name: Build firmware
run-name: Build ${{ inputs.build_id }}

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Client-generated correlation id
        required: true
      distro:
        description: openwrt | immortalwrt
        required: true
      version:
        description: Release version (e.g. 24.10.1)
        required: true
      target:
        description: target/subtarget (e.g. ramips/mt7621)
        required: true
      profile:
        description: Device profile id from profiles.json
        required: true
      packages:
        description: Space-separated package list; a leading '-' removes a default package
        required: false
        default: ''
      config_json:
        description: 'JSON object with whitelisted keys only: hostname, timezone, lanIp, rootPassword, wifiSsid, wifiPassword'
        required: false
        default: '{}'
      community_packages:
        description: 'JSON array of community add-on ids'
        required: false
        default: '[]'
      ui_language:
        description: 'UI language code (en default)'
        required: false
        default: 'en'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # hard cap (PRD §6); overrunning runs conclude as timed_out
    permissions:
      contents: write # publish build artifacts as a GitHub Release (built-in GITHUB_TOKEN)
    # Inputs are always passed to scripts through env, never interpolated into run bodies
    # (script-injection hygiene for a public repo).
    env:
      DISTRO: ${{ inputs.distro }}
      VERSION: ${{ inputs.version }}
      TARGET: ${{ inputs.target }}
      PROFILE: ${{ inputs.profile }}
      PACKAGES: ${{ inputs.packages }}
      CONFIG_JSON: ${{ inputs.config_json }}
      BUILD_ID: ${{ inputs.build_id }}
      COMMUNITY_PACKAGES: ${{ inputs.community_packages }}
      UI_LANGUAGE: ${{ inputs.ui_language }}
    steps:
      # Checked out first and unconditionally: it must run before ImageBuilder is downloaded and
      # extracted into this same workspace. actions/checkout@v4's prepare-existing-directory logic
      # wipes everything at the workspace root when there is no existing .git — if checkout ran
      # later (e.g. gated behind community_packages), it would delete the already-extracted
      # ImageBuilder dir and the generated uci-defaults files out from under the later steps.
      # Repo files (scripts/, data/, src/) land alongside the ImageBuilder's own
      # openwrt-imagebuilder-* subdir with no path collision.
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve ImageBuilder archive
        id: ib
        run: |
          # downloads.openwrt.org and downloads.immortalwrt.org share the same URL layout.
          case "$DISTRO" in
            openwrt)     BASE="https://downloads.openwrt.org" ;;
            immortalwrt) BASE="https://downloads.immortalwrt.org" ;;
            *) echo "unsupported distro: $DISTRO" >&2; exit 1 ;;
          esac
          NAME="$DISTRO-imagebuilder-$VERSION-$(echo "$TARGET" | tr / -).Linux-x86_64"
          DIR_URL="$BASE/releases/$VERSION/targets/$TARGET"
          # Archive compression differs across releases (24.10+ ships .tar.zst, older .tar.xz).
          for EXT in tar.zst tar.xz; do
            if curl -sfLI "$DIR_URL/$NAME.$EXT" > /dev/null; then
              {
                echo "url=$DIR_URL/$NAME.$EXT"
                echo "archive=$NAME.$EXT"
                echo "dir=$NAME"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "no ImageBuilder archive found under $DIR_URL" >&2
          exit 1

      # The ImageBuilder tarball (100-500 MB) rarely changes within a release — cache it so
      # repeat builds for popular targets skip the download.
      - name: Cache ImageBuilder archive
        uses: actions/cache@v4
        with:
          path: ${{ steps.ib.outputs.archive }}
          key: ${{ steps.ib.outputs.archive }}

      - name: Download ImageBuilder (cache miss)
        run: |
          if [ ! -f "${{ steps.ib.outputs.archive }}" ]; then
            curl -fL -o "${{ steps.ib.outputs.archive }}" "${{ steps.ib.outputs.url }}"
          fi

      - name: Extract ImageBuilder
        # tar -a picks the decompressor from the extension (zstd and xz are preinstalled).
        run: tar -xaf "${{ steps.ib.outputs.archive }}"

      - name: Generate uci-defaults from whitelisted config
        working-directory: ${{ steps.ib.outputs.dir }}
        run: |
          # Every field is extracted explicitly by name — unknown keys in config_json are
          # silently ignored, which enforces the PRD §3.3 whitelist. There is deliberately
          # no arbitrary-file upload and no raw uci-defaults passthrough.
          mkdir -p files/etc/uci-defaults
          OUT=files/etc/uci-defaults/99-custom-config
          echo '#!/bin/sh' > "$OUT"

          # sq: single-quote a value so it is inert inside the generated first-boot script.
          sq() { printf "'%s'" "$(printf %s "$1" | sed "s/'/'\\\\''/g")"; }
          get() { jq -r --arg k "$1" '.[$k] // empty' <<< "$CONFIG_JSON"; }

          HOSTNAME_V=$(get hostname)
          TIMEZONE_V=$(get timezone)
          LAN_IP_V=$(get lanIp)
          ROOT_PW_V=$(get rootPassword)
          WIFI_SSID_V=$(get wifiSsid)
          WIFI_PW_V=$(get wifiPassword)

          if [ -n "$HOSTNAME_V" ]; then
            echo "uci set system.@system[0].hostname=$(sq "$HOSTNAME_V")" >> "$OUT"
          fi
          if [ -n "$TIMEZONE_V" ]; then
            # IANA zone name (e.g. Asia/Shanghai); LuCI derives the TZ string on save.
            echo "uci set system.@system[0].zonename=$(sq "$TIMEZONE_V")" >> "$OUT"
          fi
          if [ -n "$LAN_IP_V" ]; then
            echo "uci set network.lan.ipaddr=$(sq "$LAN_IP_V")" >> "$OUT"
          fi
          if [ -n "$WIFI_SSID_V" ]; then
            echo "uci set wireless.@wifi-device[0].disabled='0'" >> "$OUT"
            echo "uci set wireless.@wifi-iface[0].disabled='0'" >> "$OUT"
            echo "uci set wireless.@wifi-iface[0].ssid=$(sq "$WIFI_SSID_V")" >> "$OUT"
            if [ -n "$WIFI_PW_V" ]; then
              echo "uci set wireless.@wifi-iface[0].encryption='psk2'" >> "$OUT"
              echo "uci set wireless.@wifi-iface[0].key=$(sq "$WIFI_PW_V")" >> "$OUT"
            fi
          fi
          echo 'uci commit' >> "$OUT"
          if [ -n "$ROOT_PW_V" ]; then
            echo "printf '%s\n' $(sq "root:$ROOT_PW_V") | chpasswd" >> "$OUT"
          fi
          echo 'exit 0' >> "$OUT"

      - name: Resolve community add-ons
        if: ${{ fromJSON(inputs.community_packages)[0] != null }}
        run: |
          IB_DIR="${{ steps.ib.outputs.dir }}"
          # arch_packages for this target, as already captured by `pnpm sync` into data/catalog/targets.json
          # (the same field the target's own profiles.json exposes) — fills the feed URL templates below.
          ARCH=$(jq -r --arg k "$DISTRO/$VERSION/$TARGET" '.[$k].archPackages // empty' data/catalog/targets.json)
          if [ -z "$ARCH" ]; then
            echo "no archPackages found for $DISTRO/$VERSION/$TARGET in data/catalog/targets.json" >&2
            exit 1
          fi

          # --yes avoids an interactive "install tsx?" prompt on a fresh runner (no node_modules —
          # a full `pnpm install` isn't needed since resolve-cli.ts and its imports only touch
          # node:fs/node:path at runtime).
          COMMUNITY_IDS="$COMMUNITY_PACKAGES" IB_ARCH="$ARCH" IB_VERSION="$VERSION" \
            npx --yes tsx scripts/build/resolve-cli.ts > /tmp/community.json

          # feeds -> repositories.conf; opkg's check_signature is a file-wide toggle (not per-feed:
          # opkg has no concept of "verify this src/gz line but not that one"), so drop it when any
          # selected feed has no signing key available in this ImageBuilder's keyring. This disables
          # signature verification for ALL feeds in this build, including the official upstream feeds
          # re-added to repositories.conf by ImageBuilder — not just the unsigned community feed. This
          # is a deliberate, file-wide trust-boundary decision (spec §7): we don't trust "any URL with
          # a valid signature", we trust our own vetted community-package catalog (data/packages/community.json,
          # curated and reviewed before merge). Making this per-feed is not possible with opkg's
          # repositories.conf format.
          jq -r '.feeds[] | "src/gz \(.name) \(.url)"' /tmp/community.json >> "$IB_DIR/repositories.conf"
          if jq -e '[.feeds[] | select(.checkSignature == false)] | length > 0' /tmp/community.json > /dev/null; then
            sed -i '/^option check_signature/d' "$IB_DIR/repositories.conf"
          fi

          # release assets -> local packages folder (ImageBuilder re-indexes and signs this itself)
          mkdir -p "$IB_DIR/packages"
          jq -r '.assetUrls[]' /tmp/community.json | while read -r url; do
            curl -fsSL -o "$IB_DIR/packages/$(basename "$url")" "$url"
          done

          # per-arch tarballs (nikki, mosdns, ...) ship no arch-independent package: download each,
          # extract to a scratch dir, and move the ipks/apks inside into the same packages folder.
          jq -r '.tarballUrls[]' /tmp/community.json | while read -r url; do
            SCRATCH=$(mktemp -d)
            curl -fsSL -o "$SCRATCH/tarball.tar.gz" "$url"
            tar -xzf "$SCRATCH/tarball.tar.gz" -C "$SCRATCH"
            find "$SCRATCH" -type f \( -name '*.ipk' -o -name '*.apk' \) -exec mv {} "$IB_DIR/packages/" \;
            rm -rf "$SCRATCH"
          done

          # export package + depend names for the Build image step
          {
            echo "COMMUNITY_PKGS=$(jq -r '(.packages + .extraDepends) | join(" ")' /tmp/community.json)"
          } >> "$GITHUB_ENV"

      - name: Build image
        working-directory: ${{ steps.ib.outputs.dir }}
        # Assembles precompiled packages into flashable images (typically 1-5 minutes).
        run: make image PROFILE="$PROFILE" PACKAGES="$PACKAGES${COMMUNITY_PKGS:+ $COMMUNITY_PKGS}" FILES="$PWD/files"

      - name: Publish images and metadata as a GitHub Release
        working-directory: ${{ steps.ib.outputs.dir }}
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_REPO: ${{ github.repository }}
        run: |
          mkdir -p upload
          # Flashable images only — skip package indexes, manifests, and build metadata.
          find "bin/targets/$TARGET" -maxdepth 1 -type f \
            \( -name '*.bin' -o -name '*.img' -o -name '*.img.gz' -o -name '*.itb' \
               -o -name '*.vmdk' -o -name '*rootfs.tar.gz' \) \
            -exec cp {} upload/ \;
          if [ -z "$(ls -A upload)" ]; then
            echo 'build produced no images' >&2
            exit 1
          fi
          # Primary artifact for meta.json: prefer the sysupgrade image, else the first image.
          PRIMARY=$(ls upload | grep -i sysupgrade | head -n1)
          if [ -z "$PRIMARY" ]; then PRIMARY=$(ls upload | head -n1); fi
          SHA256=$(sha256sum "upload/$PRIMARY" | cut -d' ' -f1)
          SIZE=$(stat -c %s "upload/$PRIMARY")
          EXPIRES=$(date -u -d '+1 day' +%Y-%m-%dT%H:%M:%SZ)
          jq -n --arg id "$BUILD_ID" --arg file "$PRIMARY" --arg sha "$SHA256" \
                --argjson size "$SIZE" --arg exp "$EXPIRES" \
                '{buildId: $id, file: $file, sha256: $sha, sizeBytes: $size, expiresAt: $exp}' \
                > upload/meta.json
          # Publish all images + meta.json as assets on a per-build release; the executor reads
          # https://github.com/<repo>/releases/download/build-<id>/{meta.json,<image>}.
          gh release create "build-$BUILD_ID" upload/* \
            --repo "$BUILD_REPO" --title "Build $BUILD_ID" \
            --notes "Automated firmware build. Assets expire ~$EXPIRES (pruned by prune-builds.yml)."
